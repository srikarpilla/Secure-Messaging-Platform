services:
  # ── Backend: Flask + Flask-SocketIO ──────────────────────────────────────
  - type: web
    name: signalchat-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python start.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/data/uploads
      # Set CORS_ORIGINS to your frontend URL after first deploy:
      # - key: CORS_ORIGINS
      #   value: https://signalchat-frontend.onrender.com
    disk:
      name: signalchat-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  # ── Frontend: Next.js ─────────────────────────────────────────────────────
  - type: web
    name: signalchat-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # Set this to your backend Render URL after first deploy:
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://signalchat-backend.onrender.com
