services:
  - type: web
    plan: free
    name: signalchat-monolith
    runtime: python
    buildCommand: ./build.sh
    startCommand: cd backend && python start.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/data/uploads
      - key: NODE_VERSION
        value: "20.11.0"
